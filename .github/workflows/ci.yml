name: CI - Pruebas de Integración y Cobertura

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y ejecutar todas las pruebas con cobertura
        run: mvn clean verify --no-transfer-progress

      - name: Publicar reporte de cobertura JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          if-no-files-found: warn

      - name: Publicar resultados de pruebas (surefire)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-test-results
          path: target/surefire-reports/
          if-no-files-found: warn

      - name: Publicar resultados de pruebas (failsafe)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failsafe-test-results
          path: target/failsafe-reports/
          if-no-files-found: warn

      - name: Resumen del pipeline
        if: always()
        run: |
          echo "## Resumen CI/CD - Pruebas de Integración" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Etapa | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Compilación | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pruebas unitarias e integración (Surefire) | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pruebas de sistema HTTP (Failsafe) | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cobertura JaCoCo (mín. 75% líneas, 70% ramas) | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
